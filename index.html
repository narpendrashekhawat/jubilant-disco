<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Clone Heading</title>
    <!-- Link to CSS File -->
     
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="style.css">

</head>
<body>
    <header class="amazon-header">
        <!-- FIRST LINE: Main navigation-->
        <div class="nav-top">
            <!-- Logo -->
        <div class="nav-logo border-hover">
            <!-- Replace with actual Amazon logo image later-->
             <img src="https://pngimg.com/uploads/amazon/amazon_PNG11.png" class="amazon-logo">
             <span class="logo-text">.in</span>
    </div>

        <!-- Location -->
        <div class="nav-location border-hover">

             <i class="fa-solid fa-location-dot location-icon"></i>

            <div class="location-text">
                <p class="text-small">Delivering to Jaipur 302012</p> 
                 <p class="text-bold">Update Location</p>
            </div>
        </div>
        
        <!-- Search Bar-->
         <div class="nav-search">
            <select class="search-select">
                <option>All</option>
                </select>
                 
                <input type="text" class="search-input" placeholder="Search Amazon.in">
                <button class="search-btn">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
                </div>

                <!-- Language with India Flag -->
                <div class="nav-language border-hover">
                    <img src="https://flagcdn.com/w20/in.png" class="india-flag" alt="India">
                    <span class="text-bold">EN</span>
                    <i class="fa-solid fa-caret-down caret-icon"></i>
                  </div>  

                <!-- Account & Lists -->
                <div class="nav-account border-hover">
                    <p class="text-small">Hello, Sign in</p>
                    <p class="text-bold">Account & Lists</p>
                </div>

                <!-- Returns & Orders -->
                <div class="nav-orders border-hover">
                    <p class="text-small">Returns</p>
                    <p class="text-bold">& Orders</p>
                    </div>

                   <!-- Cart -->
                     <div class="nav-cart border-hover">
                        <div class="cart-wrapper">
                            <span class="cart-number">0</span>
                     <i class="fa-solid fa-cart-shopping cart-icon"></i>
                     </div>
                        <p class="cart-text">Cart</p>
                    </div>
                </div>
                <!-- SECOND LINE: Additional navigation options -->
                 <div class="nav-bottom">
                    <div class="nav-item border-hover nav-all-menu">
                        <i class="fa-solid fa-bars"></i>
                        <span class="text-bold" style="margin-left: 5px;">All</span>
                    </div>
                    <div class="nav-item border-hover">Fresh</div>
                    <div class="nav-item border-hover">MX Player</div>
                    <div class="nav-item border-hover">Sell</div>
                    <div class="nav-item border-hover">Bestsellers</div>
                    <div class="nav-item border-hover">Today's Deals</div>
                    <div class="nav-item border-hover">Mobiles</div>
                    <div class="nav-item border-hover">New Releases</div>
                    <div class="nav-item border-hover">Prime</div>
                    <div class="nav-item border-hover">Amazon Pay</div>
                    <div class="nav-item border-hover">Electronics</div>
                    <div class="nav-item border-hover">Customer Service</div>
                    <div class="nav-item border-hover">Home & Kitchen</div>
                    <div class="nav-item border-hover">Fashion</div>
                    <div class="nav-item border-hover">Computers</div>
                 </div>
                 </header>

                 </body>
                 </html>
